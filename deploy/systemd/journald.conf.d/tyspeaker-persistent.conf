# Keep system logs across power loss. The scooter's Pi can lose power mid-ride
# (battery dies); with the default volatile journal every reboot wipes the logs,
# so we can never see what happened. Persistent storage (in /var/log/journal)
# survives the reboot. Capped so it can't fill the SD card.
#
# Install: sudo install -D -m644 \
#   deploy/systemd/journald.conf.d/tyspeaker-persistent.conf \
#   /etc/systemd/journald.conf.d/tyspeaker-persistent.conf
# then: sudo systemctl restart systemd-journald
[Journal]
Storage=persistent
SystemMaxUse=100M

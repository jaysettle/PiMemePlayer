<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 160" role="img" aria-labelledby="title desc">
  <title id="title">TySpeaker logo</title>
  <desc id="desc">Colorful speaker logo for the TySpeaker sound player.</desc>
  <defs>
    <linearGradient id="badge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#25d9ff"/>
      <stop offset=".42" stop-color="#7cff6b"/>
      <stop offset="1" stop-color="#ff7a18"/>
    </linearGradient>
    <linearGradient id="word" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".55" stop-color="#b8f5ff"/>
      <stop offset="1" stop-color="#ffe66d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect x="10" y="16" width="132" height="128" rx="30" fill="url(#badge)" filter="url(#shadow)"/>
  <circle cx="76" cy="80" r="42" fill="#111827" opacity=".92"/>
  <circle cx="76" cy="80" r="25" fill="#1f2937"/>
  <circle cx="76" cy="80" r="11" fill="#25d9ff"/>
  <path d="M112 44 C134 58 146 74 146 80 C146 86 134 102 112 116" fill="none" stroke="#ffe66d" stroke-width="11" stroke-linecap="round"/>
  <path d="M125 28 C158 49 174 69 174 80 C174 91 158 111 125 132" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity=".75"/>
  <path d="M31 116 L55 47 L87 47 L62 83 L96 83 L48 129 L62 96 Z" fill="#ff7a18" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>

  <text x="170" y="75" font-family="Arial, Helvetica, sans-serif" font-size="45" font-weight="800" letter-spacing="0" fill="url(#word)">TySpeaker</text>
  <text x="174" y="113" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="1.8" fill="#b7c7ff">BUTTON SOUND MACHINE</text>
  <g fill="none" stroke-linecap="round" stroke-width="8">
    <path d="M443 40 C461 52 469 66 469 80 C469 94 461 108 443 120" stroke="#25d9ff"/>
    <path d="M465 27 C493 47 506 64 506 80 C506 96 493 113 465 133" stroke="#7cff6b"/>
  </g>
</svg>
